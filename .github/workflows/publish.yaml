name: '🚀 Publish Plugin'

on:
  release:
    types:
      - released

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Sync version from GITHUB_REF
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          VERSION="${REF#v}"
          echo "Syncing csproj to version: $VERSION"
          sed -i 's|<Version>[^<]*</Version>|<Version>'"$VERSION"'</Version>|g' src/JellyfinMediaShare.csproj
          sed -i 's|<AssemblyVersion>[^<]*</AssemblyVersion>|<AssemblyVersion>'"$VERSION"'.0</AssemblyVersion>|g' src/JellyfinMediaShare.csproj
          sed -i 's|<FileVersion>[^<]*</FileVersion>|<FileVersion>'"$VERSION"'.0</FileVersion>|g' src/JellyfinMediaShare.csproj
          cat src/JellyfinMediaShare.csproj
      - name: Build Jellyfin Plugin
        uses: oddstr13/jellyfin-plugin-repository-manager@9497a0a499416cc572ed2e07a391d9f943a37b4d # v1.1.1
        id: jprm
        with:
          dotnet-target: 'net9.0'
          path: ./src
          version: ${{ env.GITHUB_REF }}

      - name: Upload Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-artifact
          retention-days: 30
          if-no-files-found: error
          path: ${{ steps.jprm.outputs.artifact }}
      - name: Upload release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/*
          name: ${{ env.GITHUB_REF }}
        

  manifest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: artifact

      - name: Sync version from GITHUB_REF
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          VERSION="${REF#v}"
          echo "Syncing csproj to version: $VERSION"
          sed -i 's|<Version>[^<]*</Version>|<Version>'"$VERSION"'</Version>|g' src/JellyfinMediaShare.csproj
          sed -i 's|<AssemblyVersion>[^<]*</AssemblyVersion>|<AssemblyVersion>'"$VERSION"'.0</AssemblyVersion>|g' src/JellyfinMediaShare.csproj
          sed -i 's|<FileVersion>[^<]*</FileVersion>|<FileVersion>'"$VERSION"'.0</FileVersion>|g' src/JellyfinMediaShare.csproj


      - name: Read version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' src/JellyfinMediaShare.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum artifact/*.zip | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "checksum=$CHECKSUM"

      - name: Update manifest.json
        env:
          PLUGIN_VERSION: ${{ env.GITHUB_REF || steps.version.outputs.version }}
          CHANGELOG: ${{ inputs.changelog || github.event.release.body || 'Automated release' }}
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
          SOURCE_URL: https://github.com/${{ github.repository }}/releases/download/${{ env.GITHUB_REF || steps.version.outputs.version }}/__artifact__
        run: |
          ARTIFACT=$(ls artifact/*.zip | xargs basename)
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${PLUGIN_VERSION}/${ARTIFACT}"

          python3 << 'PYEOF'
          import json, os, subprocess

          changelog  = os.environ.get("CHANGELOG", "").strip() or "Automated release"
          checksum   = os.environ["CHECKSUM"]
          source_url = os.environ["SOURCE_URL"]
          plugin_ver = os.environ["PLUGIN_VERSION"].lstrip("v")

          entry = {
              "changelog":  changelog,
              "targetAbi":  "10.11.0.0",
              "version":    plugin_ver + ".0",
              "sourceUrl":  source_url,
              "checksum":   checksum,
              "timestamp": subprocess.check_output(
                  ["date", "-u", "+%Y-%m-%dT%H:%M:%SZ"]
              ).decode().strip(),
          }

          with open("manifest.json") as f:
              manifest = json.load(f)

          plugin = manifest["plugins"][0]
          if plugin.get("versions") is None:
              plugin["versions"] = []
          plugin["versions"].append(entry)
          # keep newest first
          plugin["versions"].sort(
              key=lambda v: [int(x) for x in v["version"].split(".")],
              reverse=True,
          )

          with open("manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          print(json.dumps(entry, indent=2))
          PYEOF

      - name: Commit manifest update
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore(manifest): add version ${{ env.GITHUB_REF || steps.version.outputs.version }}"
          file_pattern: manifest.json
          skip_dirty_check: false
